name: Weekly Market Recap

on:
  schedule:
    - cron: "0 1 * * 1"  # 9:00 AM SGT (UTC+8) every Monday
  workflow_dispatch:
    inputs:
      as_of_date:
        description: "Simulate run as of this date (YYYY-MM-DD). Leave blank for latest data."
        required: false
        default: ""

jobs:
  recap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run weekly recap
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
          RUN_AS_OF: ${{ github.event.inputs.as_of_date }}
        run: python agents/weekly_recap.py
